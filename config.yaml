baseURL: '/'
languageCode: en-us
theme: conventional-commits
defaultContentLanguageInSubdir: true
defaultContentLanguage: "en"

disableKinds: ['home', 'taxonomy', 'term']

# Global parameters
params:
  license:
    title: License
    action:
      label: Creative Commons - CC BY 3.0
      url: 'https://creativecommons.org/licenses/by/3.0/'

  footer:
    logos:
    - name: github
      url: 'https://github.com/itzzjustmateo/conventionalrepositories'

# Languages parameters
languages:
  en:
    weight: 1
    languageName: "English"
    title: Conventional Repositories
    params:
      description: A specification for standardizing repository names, inspired by the principles of Conventional Commits — bringing consistency, discoverability, and automation to how you name repositories across your organization.
      actions:
      - label: Get Started
        url: '#features'
        style: primary
      - label: Read the Specification
        url: '#specification'
        style: secondary

  it:
    weight: 2
